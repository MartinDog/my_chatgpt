server:
  port: 8080

spring:
  ai:
    # vLLM (OpenAI 호환 API) - chat + embedding
    openai:
      api-key: ${VLLM_API_KEY:none}
      chat:
        base-url: http://${VLLM_CHAT_HOST:localhost}:${VLLM_CHAT_PORT:8000}/v1
        options:
          model: ${VLLM_CHAT_MODEL:qwen3:30b}
          temperature: 0.3
          max-tokens: 4096
      embedding:
        base-url: http://${VLLM_EMBED_HOST:localhost}:${VLLM_EMBED_PORT:8001}/v1
        options:
          model: ${VLLM_EMBEDDING_MODEL:bge-m3}
    vectorstore:
      chroma:
        client:
          host: http://${CHROMA_HOST:localhost}
          port: ${CHROMA_PORT:8000}
        collection-name: ${CHROMA_COLLECTION:mychatgpt}
        tenant-name: default_tenant
        database-name: default_database
        initialize-schema: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mychatgpt}
    username: ${DB_USERNAME:mychatgpt}
    password: ${DB_PASSWORD:mychatgpt}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 120000
      connection-timeout: 5000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ChromaDB
chromadb:
  host: ${CHROMA_HOST:localhost}
  port: ${CHROMA_PORT:8000}
  collection-name: ${CHROMA_COLLECTION:mychatgpt}

# File upload
file:
  upload-dir: ${FILE_UPLOAD_DIR:/app/uploads}

# Logging
logging:
  file:
    path: ${LOG_DIR:/app/logs}

