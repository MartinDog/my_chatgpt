version: '3.8'

services:
  # 1. PostgreSQL (pgvector 지원 가능 버전)
  postgres:
    image: pgvector/pgvector:pg16  # pgvector가 사전 설치된 공식 이미지 추천
    container_name: mychatgpt-postgres
    environment:
      POSTGRES_DB: mychatgpt
      POSTGRES_USER: mychatgpt
      POSTGRES_PASSWORD: mychatgpt
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mychatgpt"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. ChromaDB (Vector DB)
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: mychatgpt-chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. vLLM - Chat 모델
  vllm-chat:
    image: vllm/vllm-openai:latest
    container_name: mychatgpt-vllm-chat
    ports:
      - "8100:8000"
    volumes:
      - ./data/vllm:/root/.cache/huggingface
    command: ["--model", "${VLLM_CHAT_MODEL:-Qwen/Qwen3-30B}", "--host", "0.0.0.0", "--port", "8000"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # 4. vLLM - Embedding 모델
  vllm-embed:
    image: vllm/vllm-openai:latest
    container_name: mychatgpt-vllm-embed
    ports:
      - "8101:8000"
    volumes:
      - ./data/vllm:/root/.cache/huggingface
    command: ["--model", "${VLLM_EMBEDDING_MODEL:-BAAI/bge-m3}", "--host", "0.0.0.0", "--port", "8000", "--task", "embed"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # 5. Spring Boot App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mychatgpt-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mychatgpt
      DB_USERNAME: mychatgpt
      DB_PASSWORD: mychatgpt
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      VLLM_CHAT_HOST: vllm-chat
      VLLM_CHAT_PORT: 8000
      VLLM_CHAT_MODEL: ${VLLM_CHAT_MODEL:-Qwen/Qwen3-30B}
      VLLM_EMBED_HOST: vllm-embed
      VLLM_EMBED_PORT: 8000
      VLLM_EMBEDDING_MODEL: ${VLLM_EMBEDDING_MODEL:-BAAI/bge-m3}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/uploads

